<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArchitectLibrary Admin</title>

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
}

.container{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#0f172a;
}

label{
    display:block;
    margin-top:15px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0 20px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#0f766e;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    margin-top:10px;
}

button:hover{
    background:#115e59;
}

#logoutBtn{
    background:#dc2626;
}

#logoutBtn:hover{
    background:#b91c1c;
}

#status{
    text-align:center;
    color:green;
    margin-top:20px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>ArchitectLibrary Admin</h1>

<label>Zain Cash</label>
<input id="zain">

<label>Orange Money</label>
<input id="orange">

<label>CliQ</label>
<input id="cliq">

<button id="saveBtn">
Save Changes
</button>

<button onclick="window.location.href='files.html'">
Manage Files
</button>

<button id="logoutBtn">
Logout
</button>

<div id="status"></div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
