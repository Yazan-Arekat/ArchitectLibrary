<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArchitectLibrary Login</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:380px;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h2{
text-align:center;
margin-bottom:25px;
color:#0f172a;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
background:#0f766e;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#115e59;
}

#error{
margin-top:15px;
color:red;
text-align:center;
}
</style>

</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

<p id="error"></p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
