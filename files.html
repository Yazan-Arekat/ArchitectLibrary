<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Files</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
}

.container{
    width:950px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    background:#0f766e;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#115e59;
}

table{
    width:100%;
    margin-top:30px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

th{
    background:#0f766e;
    color:white;
}

.actionBtn{
    width:auto;
    padding:8px 15px;
    font-size:14px;
    margin:2px;
}

.editBtn{
    background:#2563eb;
}

.deleteBtn{
    background:#dc2626;
}

</style>

</head>

<body>

<div class="container">

<h1>Manage Files</h1>

<input id="name" placeholder="File Name">

<select id="program">
    <option value="AutoCAD">AutoCAD</option>
    <option value="Revit">Revit</option>
    <option value="SketchUp">SketchUp</option>
    <option value="Lumion">Lumion</option>
    <option value="3ds Max">3ds Max</option>
    <option value="Photoshop">Photoshop</option>
</select>

<select id="type">
    <option value="Library">Library</option>
    <option value="Courses">Courses</option>
    <option value="Projects">Projects</option>
    <option value="Request">Request</option>
    <option value="Payment">Payment</option>
</select>

<input id="category" placeholder="Category">

<input id="path" placeholder="files/autocad/file.dwg">

<button id="addBtn">
Add File
</button>

<table>

<thead>

<tr>

<th>Name</th>

<th>Program</th>

<th>Type</th>

<th>Category</th>

<th>Path</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="table">

</tbody>

</table>

</div>

<script type="module" src="files.js"></script>

</body>
</html>
