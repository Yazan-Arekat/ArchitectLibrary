<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Custom Project</title>

<link rel="stylesheet" href="../../style.css">
</head>

<body>

<header>
    <h1>📞 Request a Custom Project</h1>
    <p>Submit Your Project Requirements</p>
</header>

<div class="programs">

    <div class="card">

        <h2>Client Information</h2>

        <form>

            <p>Full Name</p>
            <input type="text" style="width:100%; padding:10px;">

            <br><br>

            <p>Phone Number</p>
            <input type="text" style="width:100%; padding:10px;">

            <br><br>

            <p>Project Type</p>
            <input type="text" style="width:100%; padding:10px;">

            <br><br>

            <p>Project Description</p>
            <textarea style="width:100%; height:150px; padding:10px;"></textarea>

            <br><br>

            <button type="submit">
                Submit Request
            </button>

        </form>

    </div>

</div>

<div style="text-align:center; margin:30px;">
    <a href="autocad.html" class="back-btn">⬅ Back to AutoCAD</a>
</div>

</body>
</html>
